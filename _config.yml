title: Cristhian Fuentes
description: Publicidad, ideas, proyectos y otras cosas.
url: "https://casafuego.github.io"
baseurl: ""

author:
  name: Cristhian Fuentes


image: /assets/img/og-default.png
permalink: /:title/

markdown: kramdown
kramdown:
  input: GFM

plugins:
  - jekyll-archives
  - jekyll-seo-tag
  - jekyll-sitemap

jekyll-archives:
  enabled:
    - tags
  layouts:
    tag: tag
  permalinks:
    tag: /temas/:name/

defaults:
  - scope:
      path: ""
    values:
      image: /assets/img/og-default.png

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - setup-jekyll.sh
